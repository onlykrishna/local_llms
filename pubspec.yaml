name: offline_ai_flutter_demo
description: A Flutter demo app showcasing offline AI with local LLMs using Clean Architecture and GetX.
publish_to: 'none'
version: 2.0.0+1
environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  get: ^4.6.6
  get_storage: ^2.1.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.1
  http: ^1.2.0
  connectivity_plus: ^6.0.5

  # On-device AI (llama.cpp GGUF - replaces flutter_gemma)
  llamadart: ^0.6.10

  # File & Storage
  path_provider: ^2.1.2
  file_picker: ^8.1.7

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.6.14+1
  flutter_spinkit: ^5.2.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/fallback_dataset.json
    - assets/local_brain.json
